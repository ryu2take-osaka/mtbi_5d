<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBTI 5D Visualizer (Interactive Engine)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #visualizer-main {
            flex: 1;
            display: flex;
            width: 100%;
            height: 50vh;
            min-height: 350px;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            z-index: 1;
        }

        #ui-panel {
            position: relative;
            width: 100%;
            background: rgba(10, 10, 15, 1);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            padding: 15px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            max-height: 50vh;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        #header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        #header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .main-ui {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .controls-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.6);
            flex: 1;
            text-align: center;
            font-size: 13px;
        }

        .tab .mbti-type {
            display: block;
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        .sliders {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-label {
            width: 130px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        .slider-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .adjust-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
            user-select: none;
        }

        .adjust-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .slider-wrapper {
            position: relative;
            flex: 1;
            height: 24px;
            display: flex;
            align-items: center;
        }

        .ticks {
            position: absolute;
            left: 10px;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 1;
        }

        .tick-mark {
            width: 2px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 1px;
        }

        input[type=range] {
            position: relative;
            z-index: 2;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
            height: 8px;
            /* Make the input the height of the track */
            border-radius: 4px;
            /* Linear gradient directly on input for reliable CSS var usage */
            background: linear-gradient(to right, var(--track-color, #ccc) 0%, var(--track-color, #ccc) var(--val, 50%), rgba(255, 255, 255, 0.15) var(--val, 50%), rgba(255, 255, 255, 0.15) 100%);
        }

        input[type=range]::-webkit-slider-runnable-track {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: transparent;
            border: none;
        }

        input[type=range]::-moz-range-track {
            width: 100%;
            height: 8px;
            background: transparent;
            border: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            margin-top: -6px;
            /* Center thumb over 8px track (20-8)/2 = 6 */
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--track-color, #ccc);
        }

        input[type=range]::-moz-range-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--track-color, #ccc);
        }

        input[type=range]:focus {
            outline: none;
        }

        .slider-val {
            display: none;
            /* Hide the simple value display */
        }

        .bold {
            font-weight: 800;
            color: #fff;
        }

        .info-area {
            width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            padding-left: 30px;
        }

        .info-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 42px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .rank-badge {
            font-size: 28px;
            font-weight: 800;
            padding: 4px 20px;
            border-radius: 8px;
            text-shadow: 0 0 10px currentColor;
            box-shadow: 0 0 20px currentColor;
        }

        .share-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
            width: 100%;
            justify-content: center;
        }

        .share-btn.screenshot {
            background: #444;
            color: #fff;
        }

        .share-btn:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        .share-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .tab-panel {
            display: none;
            width: 100%;
        }

        .tab-panel.active {
            display: block;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin-bottom: 20px;
            gap: 20px;
        }

        .score-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .score-narration {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }



        .function-node {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }

        .function-node.glow-high {
            border-color: #ffd700;
            box-shadow: 0 0 20px #ffd700, inset 0 0 10px #ffd700;
            color: #fff;
            background: rgba(255, 215, 0, 0.3);
            opacity: 1 !important;
        }

        .function-node.glow-mid {
            border-color: #00bfff;
            box-shadow: 0 0 15px #00bfff;
            color: #fff;
            background: rgba(0, 191, 255, 0.2);
            opacity: 1 !important;
        }

        .function-node.glow-mirror {
            animation: pulse-mirror 2s infinite;
            opacity: 1 !important;
        }

        @keyframes pulse-mirror {

            0%,
            100% {
                border-color: #00ffff;
                box-shadow: 0 0 5px #00ffff;
            }

            50% {
                border-color: #fff;
                box-shadow: 0 0 20px #00ffff;
            }
        }

        .function-node.dimmed {
            opacity: 0.25;
        }

        .side-stack {
            position: absolute;
            top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        #side-stack-A {
            left: 15px;
        }

        #side-stack-B {
            right: 15px;
        }

        .side-stack-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 5px;
            white-space: nowrap;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }


        .copy-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        /* vNext++ UI Elements */
        #analysis-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 16, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(8px);
        }

        .analysis-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .analysis-text {
            font-size: 12px;
            letter-spacing: 4px;
            color: #fff;
            font-weight: 800;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #narration-panel {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            z-index: 15;
            pointer-events: none;
            display: none;
        }

        #narration-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            transform: translateY(20px);
        }

        #narration-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .function-desc {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 10px;
            -webkit-text-fill-color: #fff;
        }

        @media (max-width: 768px) {
            #visualizer-main {
                flex: none;
                height: 380px;
                min-height: 380px;
                flex-direction: column !important;
            }

            .side-stack {
                top: 10px;
                flex-direction: column;
                padding: 6px;
                gap: 8px;
                border-radius: 6px;
                width: auto !important;
            }

            .side-stack.row-sm {
                flex-direction: column;
            }

            #side-stack-A {
                left: 5px;
            }

            #side-stack-B {
                right: 5px;
            }

            .side-stack-label {
                display: none;
            }

            .function-node {
                width: 35px;
                height: 35px;
                font-size: 13px;
                line-height: 35px;
            }

            #canvas-container {
                height: 100%;
                width: 100%;
                flex: 1;
            }

            #ui-panel {
                padding: 12px 10px;
                flex: 1;
                min-height: 0;
                max-height: none;
                overflow-y: auto;
            }

            .tab .mbti-type {
                display: none;
            }

            .tabs {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 8px;
            }

            .score-row {
                flex-direction: row;
                justify-content: space-between;
                gap: 10px;
                margin-bottom: 10px;
            }

            .score-box {
                padding: 10px;
                flex: 1;
            }

            .score-box .info-title {
                font-size: 10px;
                margin-bottom: 4px;
            }

            .score-box .score-value {
                font-size: 28px;
            }

            .rank-badge {
                font-size: 11px !important;
                padding: 2px 8px !important;
            }

            #header {
                display: none;
            }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="header">
        <h1>MBTI 5D Visualizer</h1>
        <p>性格を「座標・光・密度」として体験する</p>
    </div>

    <div id="visualizer-main">
        <div id="side-stack-A" class="side-stack" style="width: 80px;">
            <div class="side-stack-label">P1 STACK</div>
            <div id="p1-f1-side" class="function-node">?</div>
            <div id="p1-f2-side" class="function-node">?</div>
            <div id="p1-f3-side" class="function-node">?</div>
            <div id="p1-f4-side" class="function-node">?</div>
        </div>

        <div id="canvas-container">
            <div id="analysis-overlay">
                <div class="analysis-spinner"></div>
                <div class="analysis-text">ANALYZING ENERGY...</div>
            </div>
            <div id="narration-panel">
                <div id="narration-text"></div>
            </div>
        </div>

        <div id="side-stack-B" class="side-stack" style="width: 80px;">
            <div class="side-stack-label">P2 STACK</div>
            <div id="p2-f1-side" class="function-node">?</div>
            <div id="p2-f2-side" class="function-node">?</div>
            <div id="p2-f3-side" class="function-node">?</div>
            <div id="p2-f4-side" class="function-node">?</div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="tabs">
            <div class="tab active" data-target="A" id="tab-A">P1<span class="mbti-type"></span></div>
            <div class="tab" data-target="B" id="tab-B">P2<span class="mbti-type"></span></div>
            <div class="tab" data-target="SCORE" id="tab-SCORE">SCORE<span></span></div>
        </div>

        <div class="main-ui">
            <!-- P1 & P2 Panels (Dynamic) -->
            <div id="panel-A" class="tab-panel active">
                <div class="sliders" id="sliders-container">
                    <!-- Slider rows will be here, or just keep them and show/hide the whole sliders div? 
                         Wait, since P1 and P2 use the same sliders layout, I'll just move the existing sliders here. -->
                    <div class="slider-row color-EI" style="--track-color: #4298B4; --val: 50%;">
                        <div class="slider-label"><span id="lbl-EI-L">外向型</span><span id="lbl-EI-R">内向型</span></div>
                        <div class="slider-control">
                            <button class="adjust-btn" data-key="EI" data-dir="-1">−</button>
                            <div class="slider-wrapper">
                                <div class="ticks" id="ticks-EI"></div>
                                <input type="range" id="slider-EI" min="0" max="100" step="1" value="50">
                            </div>
                            <button class="adjust-btn" data-key="EI" data-dir="1">+</button>
                        </div>
                    </div>
                    <!-- Repeating for others... -->
                    <div class="slider-row color-NS" style="--track-color: #E4AE3A; --val: 50%;">
                        <div class="slider-label"><span id="lbl-NS-L">直感型</span><span id="lbl-NS-R">現実型</span></div>
                        <div class="slider-control">
                            <button class="adjust-btn" data-key="NS" data-dir="-1">−</button>
                            <div class="slider-wrapper">
                                <div class="ticks" id="ticks-NS"></div>
                                <input type="range" id="slider-NS" min="0" max="100" step="1" value="50">
                            </div>
                            <button class="adjust-btn" data-key="NS" data-dir="1">+</button>
                        </div>
                    </div>
                    <div class="slider-row color-TF" style="--track-color: #33A474; --val: 50%;">
                        <div class="slider-label"><span id="lbl-TF-L">思考型</span><span id="lbl-TF-R">感情型</span></div>
                        <div class="slider-control">
                            <button class="adjust-btn" data-key="TF" data-dir="-1">−</button>
                            <div class="slider-wrapper">
                                <div class="ticks" id="ticks-TF"></div>
                                <input type="range" id="slider-TF" min="0" max="100" step="1" value="50">
                            </div>
                            <button class="adjust-btn" data-key="TF" data-dir="1">+</button>
                        </div>
                    </div>
                    <div class="slider-row color-JP" style="--track-color: #8A61A6; --val: 50%;">
                        <div class="slider-label"><span id="lbl-JP-L">計画型</span><span id="lbl-JP-R">探索型</span></div>
                        <div class="slider-control">
                            <button class="adjust-btn" data-key="JP" data-dir="-1">−</button>
                            <div class="slider-wrapper">
                                <div class="ticks" id="ticks-JP"></div>
                                <input type="range" id="slider-JP" min="0" max="100" step="1" value="50">
                            </div>
                            <button class="adjust-btn" data-key="JP" data-dir="1">+</button>
                        </div>
                    </div>
                    <div class="slider-row color-AT" style="--track-color: #E46562; --val: 50%;">
                        <div class="slider-label"><span id="lbl-AT-L">自己主張型</span><span id="lbl-AT-R">激動型</span></div>
                        <div class="slider-control">
                            <button class="adjust-btn" data-key="AT" data-dir="-1">−</button>
                            <div class="slider-wrapper">
                                <div class="ticks" id="ticks-AT"></div>
                                <input type="range" id="slider-AT" min="0" max="100" step="1" value="50">
                            </div>
                            <button class="adjust-btn" data-key="AT" data-dir="1">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="panel-SCORE" class="tab-panel">
                <div class="score-row">
                    <div class="score-box">
                        <div class="info-title">Distance Score</div>
                        <div class="score-value" id="score-display">100</div>
                        <div class="rank-badge" id="rank-display" style="font-size: 14px; padding: 2px 10px;">S</div>
                    </div>
                    <div class="score-box">
                        <div class="info-title">Complement Score</div>
                        <div class="score-value" id="comp-score-display">0</div>
                        <div class="rank-badge" id="comp-rank-display" style="font-size: 14px; padding: 2px 10px;">D
                        </div>
                    </div>
                </div>

                <div id="score-narration-box" class="score-narration">
                    ここに相性コメントが表示されます...
                </div>
                <div class="actions-grid">
                    <button class="share-btn" id="share-x-btn">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.007 4.126H5.078z">
                            </path>
                        </svg>
                        ポスト
                    </button>
                    <button class="share-btn screenshot" id="screenshot-btn">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 9c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zm9-4h-4.17l-1.42-3h-6.82l-1.42 3h-4.17c-1.103 0-2 .897-2 2v12c0 1.103.897 2 2 2h18c1.103 0 2-.897 2-2v-12c0-1.103-.897-2-2-2zm-9 13c-3.309 0-6-2.691-6-6s2.691-6 6-6 6 2.691 6 6-2.691 6-6 6z">
                            </path>
                        </svg>
                        保存
                    </button>
                    <button class="share-btn" id="copy-url-btn"
                        style="background: rgba(255,255,255,0.1); color: #fff; grid-column: span 2;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M8 10h8M10 8v8m-6-3h16a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z" />
                        </svg>
                        URLをコピー
                    </button>
                </div>

                <div class="score-summary">
                    <div class="score-summary-item" id="summary-A">
                        P1 は <span class="score-type-name">XXXX-X</span> です <span class="score-nickname">タイプ：不明</span>
                    </div>
                    <div class="score-summary-item" id="summary-B">
                        P2 は <span class="score-type-name">XXXX-X</span> です <span class="score-nickname">タイプ：不明</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="copy-toast" class="copy-toast">URLをコピーしました</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- State ---
        const state = {
            activeUser: 'A',
            users: {
                A: { EI: 50, NS: 50, TF: 50, JP: 50, AT: 50 },
                B: { EI: 50, NS: 50, TF: 50, JP: 50, AT: 50 }
            },
            mode: 'IDLE', // IDLE, EDITING, ANALYZING, PLAYING
            lastInteraction: 0,
            timeline: { phase: 'IDLE', elapsed: 0 }
        };

        const functionInfo = {
            'Ni': { name: '内向的直観', desc: '本質を見抜き、長期的な展望を描く' },
            'Ne': { name: '外向直観', desc: '多様な可能性を広げ、アイデアを繋ぐ' },
            'Si': { name: '内向感覚', desc: '過去の経験を記憶し、安定を保つ' },
            'Se': { name: '外向感覚', desc: '今この瞬間の刺激を捉え、行動する' },
            'Ti': { name: '内向思考', desc: '内部的な論理を追求し、仕組みを解く' },
            'Te': { name: '外向思考', desc: '外部の効率を求め、目標を達成する' },
            'Fi': { name: '内向感情', desc: '自身の価値観に誠実であり、調和を重んじる' },
            'Fe': { name: '外向感情', desc: '周囲の感情に同調し、人間関係を円滑にする' }
        };

        // Base64 Binary Parameter Handling
        function decodeStateFromBase64(b64) {
            try {
                const str = atob(b64);
                if (str.length !== 10) return;

                const arr = new Uint8Array(10);
                for (let i = 0; i < 10; i++) {
                    const val = str.charCodeAt(i);
                    // Invalid detection
                    if (val < 0 || val > 100 || isNaN(val)) return;
                    arr[i] = val;
                }

                const keys = ['EI', 'NS', 'TF', 'JP', 'AT'];
                keys.forEach((k, i) => {
                    state.users.A[k] = arr[i];
                    state.users.B[k] = arr[i + 5];
                });
            } catch (e) {
                // Ignore decoding errs and fallback to init state
            }
        }

        function encodeStateToBase64() {
            const keys = ['EI', 'NS', 'TF', 'JP', 'AT'];
            const arr = new Uint8Array(10);
            keys.forEach((k, i) => {
                arr[i] = state.users.A[k];
                arr[i + 5] = state.users.B[k];
            });
            // Convert to base64 via string
            return btoa(String.fromCharCode.apply(null, arr));
        }

        // Apply URL parameters if exist
        const params = new URLSearchParams(window.location.search);
        if (params.has('d')) {
            decodeStateFromBase64(params.get('d'));
            if (!isAllFifty(state.users.A) && !isAllFifty(state.users.B)) {
                state.mode = 'EDITING'; // Trigger auto-analysis on boot
                state.lastInteraction = -1000;
            }
        }

        // UI Elements
        const tabs = document.querySelectorAll('.tab');
        const sliders = {
            EI: document.getElementById('slider-EI'),
            NS: document.getElementById('slider-NS'),
            TF: document.getElementById('slider-TF'),
            JP: document.getElementById('slider-JP'),
            AT: document.getElementById('slider-AT')
        };
        const labels = {
            EI: { L: document.getElementById('lbl-EI-L'), R: document.getElementById('lbl-EI-R'), txtL: '外向型', txtR: '内向型' },
            NS: { L: document.getElementById('lbl-NS-L'), R: document.getElementById('lbl-NS-R'), txtL: '直感型', txtR: '現実型' },
            TF: { L: document.getElementById('lbl-TF-L'), R: document.getElementById('lbl-TF-R'), txtL: '思考型', txtR: '感情型' },
            JP: { L: document.getElementById('lbl-JP-L'), R: document.getElementById('lbl-JP-R'), txtL: '計画型', txtR: '探索型' },
            AT: { L: document.getElementById('lbl-AT-L'), R: document.getElementById('lbl-AT-R'), txtL: '自己主張型', txtR: '激動型' }
        };

        const scoreDisplay = document.getElementById('score-display');
        const rankDisplay = document.getElementById('rank-display');

        // Initialize Ticks
        const tickKeys = ['EI', 'NS', 'TF', 'JP', 'AT'];
        tickKeys.forEach(key => {
            const container = document.getElementById('ticks-' + key);
            for (let i = 0; i <= 10; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick-mark';
                container.appendChild(tick);
            }
        });

        // Update UI based on active user
        function refreshUI() {
            const data = state.users[state.activeUser];
            Object.keys(sliders).forEach(key => {
                const val = data[key];
                sliders[key].value = val;
                sliders[key].parentElement.parentElement.style.setProperty('--val', val + '%');
                updateLabel(key, val);
            });
        }

        // Update labels text and bold styling based on value
        function updateLabel(key, val) {
            const l = labels[key].L;
            const r = labels[key].R;
            const txtL = labels[key].txtL;
            const txtR = labels[key].txtR;

            l.className = '';
            r.className = '';

            if (val < 50) {
                l.classList.add('bold');
                l.textContent = (100 - val) + '% ' + txtL;
                r.textContent = txtR;
            } else if (val > 50) {
                r.classList.add('bold');
                l.textContent = txtL;
                r.textContent = val + '% ' + txtR;
            } else {
                l.textContent = txtL;
                r.textContent = txtR;
            }
        }

        // Handle tab clicks
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-target');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Switch Panels
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                if (target === 'SCORE') {
                    document.getElementById('panel-SCORE').classList.add('active');
                } else {
                    document.getElementById('panel-A').classList.add('active');
                    state.activeUser = target;
                    refreshUI();
                }
            });
        });

        // Handle Adjustment Buttons (- / +)
        document.querySelectorAll('.adjust-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.getAttribute('data-key');
                const dir = parseInt(btn.getAttribute('data-dir'));
                const slider = sliders[key];
                let val = parseFloat(slider.value) + dir;
                val = Math.max(0, Math.min(100, val));
                state.users[state.activeUser][key] = val;
                slider.value = val;
                slider.parentElement.parentElement.parentElement.style.setProperty('--val', val + '%');
                updateLabel(key, val);
                onInteraction();
                updateVisuals();
            });
        });

        // Handle slider changes
        Object.keys(sliders).forEach(key => {
            sliders[key].addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                state.users[state.activeUser][key] = val;
                e.target.parentElement.parentElement.style.setProperty('--val', val + '%');
                updateLabel(key, val);
                onInteraction();
                updateVisuals();
            });
        });

        function isAllFifty(data) {
            return data.EI === 50 && data.NS === 50 && data.TF === 50 && data.JP === 50 && data.AT === 50;
        }

        function onInteraction() {
            state.mode = 'EDITING';
            state.lastInteraction = performance.now();
            document.getElementById('analysis-overlay').style.display = 'none';
            document.getElementById('narration-panel').style.display = 'none';
        }

        // Share to X
        document.getElementById('share-x-btn').addEventListener('click', () => {
            const b64 = encodeStateToBase64();
            const baseUrl = window.location.origin + window.location.pathname;
            const url = `${baseUrl}?d=${encodeURIComponent(b64)}`;

            const dist = document.getElementById('score-display').textContent;
            const comp = document.getElementById('comp-score-display').textContent;
            const rankD = document.getElementById('rank-display').textContent;
            const rankC = document.getElementById('comp-rank-display').textContent;

            const text = `MBTI 5D Visualizer\n性格の「近さ」と「補完関係」を可視化\n\nDistance: ${dist} (${rankD})\nComplement: ${comp} (${rankC})\n\n結果をチェック：\n${url}`;

            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
        });

        // Screenshot functionality
        document.getElementById('screenshot-btn').addEventListener('click', () => {
            // Render one frame specifically for the capture
            composer.render();
            const link = document.createElement('a');
            const typeA = getMBTITypeString(state.users.A);
            const typeB = getMBTITypeString(state.users.B);
            link.download = `mbti_5d_${typeA}_${typeB}.png`;
            link.href = renderer.domElement.toDataURL('image/png');
            link.click();
        });

        // Copy URL
        document.getElementById('copy-url-btn').addEventListener('click', () => {
            const b64 = encodeStateToBase64();
            const baseUrl = window.location.origin + window.location.pathname;
            const url = `${baseUrl}?d=${encodeURIComponent(b64)}`;

            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('copy-toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        });

        refreshUI();

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.05);

        const w_init = container.clientWidth || 800;
        const h_init = container.clientHeight || 400;

        const camera = new THREE.PerspectiveCamera(45, w_init / h_init, 0.1, 100);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(w_init, h_init);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(w_init, h_init), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.8;
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.setSize(w_init, h_init);

        requestAnimationFrame(() => onWindowResize());

        // MBTI Nickname Mapping
        const mbtiNicknames = {
            'INTJ': '建築家', 'INTP': '論理学者', 'ENTJ': '指揮官', 'ENTP': '討論者',
            'INFJ': '提唱者', 'INFP': '仲介者', 'ENFJ': '主人公', 'ENFP': '運動家',
            'ISTJ': '管理者', 'ISFJ': '擁護者', 'ESTJ': '幹部', 'ESFJ': '領事',
            'ISTP': '巨匠', 'ISFP': '冒険家', 'ESTP': '起業家', 'ESFP': 'エンターテイナー'
        };

        const mbtiFunctionStacks = {
            'INTJ': ['Ni', 'Te', 'Fi', 'Se'],
            'INTP': ['Ti', 'Ne', 'Si', 'Fe'],
            'ENTJ': ['Te', 'Ni', 'Se', 'Fi'],
            'ENTP': ['Ne', 'Ti', 'Fe', 'Si'],
            'INFJ': ['Ni', 'Fe', 'Ti', 'Se'],
            'INFP': ['Fi', 'Ne', 'Si', 'Te'],
            'ENFJ': ['Fe', 'Ni', 'Se', 'Ti'],
            'ENFP': ['Ne', 'Fi', 'Te', 'Si'],
            'ISTJ': ['Si', 'Te', 'Fi', 'Ne'],
            'ISFJ': ['Si', 'Fe', 'Ti', 'Ne'],
            'ESTJ': ['Te', 'Si', 'Ne', 'Fi'],
            'ESFJ': ['Fe', 'Si', 'Ne', 'Ti'],
            'ISTP': ['Ti', 'Se', 'Ni', 'Fe'],
            'ISFP': ['Fi', 'Se', 'Ni', 'Te'],
            'ESTP': ['Se', 'Ti', 'Fe', 'Ni'],
            'ESFP': ['Se', 'Fi', 'Te', 'Ni']
        };

        function getNickname(typeStr) {
            const base = typeStr.split('-')[0];
            return mbtiNicknames[base] || '不明';
        }

        function getFunctionStack(typeStr) {
            const base = typeStr.split('-')[0];
            return mbtiFunctionStacks[base] || null;
        }

        // Performance limiters for mobile
        const pixelRatio = Math.min(window.devicePixelRatio, 1.5);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;

        // --- Visual Elements ---

        // MBTI Type logic
        function getMBTITypeString(data) {
            if (data.EI === 50 && data.NS === 50 && data.TF === 50 && data.JP === 50 && data.AT === 50) return "XXXX-X";
            const e = data.EI < 50 ? 'E' : (data.EI > 50 ? 'I' : 'X');
            const n = data.NS < 50 ? 'N' : (data.NS > 50 ? 'S' : 'X');
            const t = data.TF < 50 ? 'T' : (data.TF > 50 ? 'F' : 'X');
            const j = data.JP < 50 ? 'J' : (data.JP > 50 ? 'P' : 'X');
            const a = data.AT < 50 ? 'A' : (data.AT > 50 ? 'T' : 'X');
            return `${e}${n}${t}${j}-${a}`;
        }

        const SCALE = 4.0;
        const BOX_SIZE = SCALE * 2;

        // 3D Matrix / Grids mapping corners (Floor, Left Wall, Right Wall)
        const gridColorLine = 0x555566;
        const gridColorBg = 0x222233;

        // XZ Plane (Floor)
        const gridXZ = new THREE.GridHelper(BOX_SIZE, 10, gridColorLine, gridColorBg);
        gridXZ.position.set(0, -SCALE, 0);
        scene.add(gridXZ);

        // XY Plane (Back wall)
        const gridXY = new THREE.GridHelper(BOX_SIZE, 10, gridColorLine, gridColorBg);
        gridXY.rotation.x = Math.PI / 2;
        gridXY.position.set(0, 0, -SCALE);
        scene.add(gridXY);

        // YZ Plane (Side wall)
        const gridYZ = new THREE.GridHelper(BOX_SIZE, 10, gridColorLine, gridColorBg);
        gridYZ.rotation.z = Math.PI / 2;
        gridYZ.position.set(-SCALE, 0, 0);
        scene.add(gridYZ);

        // Axes (Replaced AxesHelper with thick Cylinders for better visibility)
        const axisRadius = 0.05; // Setting thickness explicitly
        const thickAxesGroup = new THREE.Group();

        // X (NS) = Yellow
        const matX = new THREE.MeshStandardMaterial({ color: 0xE4AE3A, roughness: 0.5, metalness: 0.1 });
        const geoX = new THREE.CylinderGeometry(axisRadius, axisRadius, BOX_SIZE, 8);
        const cylX = new THREE.Mesh(geoX, matX);
        cylX.rotation.z = Math.PI / 2;
        cylX.position.set(0, -SCALE, -SCALE);
        thickAxesGroup.add(cylX);

        // Y (TF) = Green
        const matY = new THREE.MeshStandardMaterial({ color: 0x33A474, roughness: 0.5, metalness: 0.1 });
        const geoY = new THREE.CylinderGeometry(axisRadius, axisRadius, BOX_SIZE, 8);
        const cylY = new THREE.Mesh(geoY, matY);
        cylY.position.set(-SCALE, 0, -SCALE);
        thickAxesGroup.add(cylY);

        // Z (JP) = Purple
        const matZ = new THREE.MeshStandardMaterial({ color: 0x8A61A6, roughness: 0.5, metalness: 0.1 });
        const geoZ = new THREE.CylinderGeometry(axisRadius, axisRadius, BOX_SIZE, 8);
        const cylZ = new THREE.Mesh(geoZ, matZ);
        cylZ.rotation.x = Math.PI / 2;
        cylZ.position.set(-SCALE, -SCALE, 0);
        thickAxesGroup.add(cylZ);

        scene.add(thickAxesGroup);

        // Group colors
        const groupColors = {
            NT: new THREE.Color('#9b59b6'), // 紫
            NF: new THREE.Color('#2ecc71'), // 緑
            SJ: new THREE.Color('#3498db'), // 青
            SP: new THREE.Color('#f1c40f')  // 黄
        };

        // Determine group color based on N-S, T-F, J-P scores (0-100)
        function getGroupColor(ns, tf, jp) {
            // N is on the left (0), S is on the right (100)
            const isN = ns < 50;
            // T is on the left (0), F is on the right (100)
            const isT = tf < 50;
            // J is on the left (0), P is on the right (100)
            const isJ = jp < 50;

            if (isN && isT) return groupColors.NT;
            if (isN && !isT) return groupColors.NF;
            if (!isN && isJ) return groupColors.SJ;
            if (!isN && !isJ) return groupColors.SP;

            return new THREE.Color('#ffffff');
        }

        // Particles reduction (mobile optimization: 16, 16 segments)
        const sphereGeo = new THREE.SphereGeometry(1, 12, 12);

        const createSphereMat = () => new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xffffff,
            emissiveIntensity: 0.5,
            roughness: 0.2,
            metalness: 0.8
        });

        const sphereA = new THREE.Mesh(sphereGeo, createSphereMat());
        const sphereB = new THREE.Mesh(sphereGeo, createSphereMat());
        scene.add(sphereA);
        scene.add(sphereB);

        // --- Enhanced Complement Beam System ---
        const beamsGroup = new THREE.Group();
        scene.add(beamsGroup);

        // Particle System for Beams
        const BEAM_PARTICLE_COUNT = 200;
        const beamParticlesGeo = new THREE.BufferGeometry();
        const beamParticlesPos = new Float32Array(BEAM_PARTICLE_COUNT * 3);
        beamParticlesGeo.setAttribute('position', new THREE.BufferAttribute(beamParticlesPos, 3));
        const beamParticlesMat = new THREE.PointsMaterial({
            size: 0.05,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffffff,
            map: new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/circle.png')
        });
        const beamParticles = new THREE.Points(beamParticlesGeo, beamParticlesMat);
        scene.add(beamParticles);

        let activeBeams = [];

        class VisualBeam {
            constructor(data) {
                this.data = data; // from, to, type, s, energy
                this.group = new THREE.Group();
                const color = data.type === 'RESCUE' ? 0xFFD700 : 0x00FFFF;

                const s = data.s;
                const opacity = 0.4 + 0.6 * s;

                // 1. Core
                const coreRadius = 0.01 + 0.03 * s;
                this.core = new THREE.Mesh(
                    new THREE.CylinderGeometry(coreRadius, coreRadius, 1, 8),
                    new THREE.MeshStandardMaterial({
                        color: color, emissive: color, emissiveIntensity: 3.0,
                        transparent: true, opacity: opacity,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    })
                );
                this.group.add(this.core);

                // 2. Glow
                const glowRadius = 0.03 + 0.08 * s;
                this.glow = new THREE.Mesh(
                    new THREE.CylinderGeometry(glowRadius, glowRadius, 1, 8),
                    new THREE.MeshStandardMaterial({
                        color: color, emissive: color, emissiveIntensity: 1.0,
                        transparent: true, opacity: opacity * 0.4,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    })
                );
                this.group.add(this.glow);

                this.particles = [];
                const pCount = Math.floor(10 + s * 20);
                for (let i = 0; i < pCount; i++) {
                    this.particles.push({ t: Math.random(), speed: 0.005 + Math.random() * 0.01 });
                }
            }

            update(time, start, end) {
                const direction = new THREE.Vector3().subVectors(end, start);
                const length = direction.length();
                if (length < 0.01) return;
                this.group.position.copy(start).add(direction.clone().multiplyScalar(0.5));
                this.group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
                this.group.scale.set(1, length, 1);
                const p = 1.0 + Math.sin(time * 3.0) * 0.1;
                this.glow.scale.set(p, 1, p);
            }
        }

        function updateBeamsVisibility(t) {
            beamsGroup.clear();
            activeBeams = [];
            const posA = sphereA.position;
            const posB = sphereB.position;
            const time = performance.now() / 1000;
            const maxBeams = 2;
            let bCount = 0;
            complementData.forEach((c, idx) => {
                if (bCount >= maxBeams) return;
                let show = (state.timeline.phase === 'CORE' && idx === 0) || (state.timeline.phase === 'SUB' && idx < 2) || (state.timeline.phase === 'OVERVIEW' && idx < 2);
                if (show) {
                    const vb = new VisualBeam(c);
                    const s = c.from === 'A' ? posA : posB;
                    const e = c.from === 'B' ? posA : posB;
                    vb.update(time, s, e);
                    activeBeams.push({ beam: vb, start: s, end: e });
                    beamsGroup.add(vb.group);
                    bCount++;
                }
            });
            const positions = beamParticlesGeo.attributes.position.array;
            let pIdx = 0;
            const dist = posA.distanceTo(posB) / SCALE;
            const pLim = Math.floor(BEAM_PARTICLE_COUNT * Math.max(0.2, 1.0 - (dist / 2.5)));
            activeBeams.forEach(ab => {
                const b = ab.beam;
                const s = ab.start;
                const e = ab.end;
                b.particles.forEach(p => {
                    if (pIdx < pLim) {
                        p.t += p.speed;
                        if (p.t > 1.0) p.t = 0;
                        const pos = new THREE.Vector3().lerpVectors(s, e, p.t);
                        const angle = time * 4 + p.t * 8;
                        pos.x += Math.sin(angle) * 0.04;
                        pos.z += Math.cos(angle) * 0.04;
                        positions[pIdx * 3] = pos.x;
                        positions[pIdx * 3 + 1] = pos.y;
                        positions[pIdx * 3 + 2] = pos.z;
                        pIdx++;
                    }
                });
            });
            for (let i = pIdx; i < BEAM_PARTICLE_COUNT; i++) positions[i * 3] = 5000;
            beamParticlesGeo.attributes.position.needsUpdate = true;
            beamParticles.visible = activeBeams.length > 0;
        }

        let complementData = [];

        function calculateComplements() {
            const uA = state.users.A;
            const uB = state.users.B;
            const typeA = getMBTITypeString(uA);
            const typeB = getMBTITypeString(uB);
            const stackA = getFunctionStack(typeA);
            const stackB = getFunctionStack(typeB);
            complementData = [];
            if (!stackA || !stackB) return;
            const strength = [1.0, 0.8, 0.6, 0.4];
            const weights = [1.3, 1.1, 0.9, 0.7];
            const energy = ((100 - uA.EI) + (100 - uB.EI)) / 200;
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (stackA[i] === stackB[j]) {
                        const sAB = (1.0 - strength[j]) * strength[i] * weights[i];
                        const sBA = (1.0 - strength[i]) * strength[j] * weights[j];
                        const totalS = sAB + sBA;
                        if (totalS > 0.01) {
                            complementData.push({
                                type: 'RESCUE', from: sAB > sBA ? 'A' : 'B', func: stackA[i],
                                s: totalS, energy, idxA: i, idxB: j
                            });
                        }
                    }
                }
            }
            const isMirror = (f1, f2) => f1.substring(0, 1) === f2.substring(0, 1) && f1.substring(1, 2) !== f2.substring(1, 2);
            for (let i = 0; i < 4; i++) {
                if (isMirror(stackA[i], stackB[i])) {
                    const s = strength[i] * 0.8 * weights[i];
                    complementData.push({ type: 'MIRROR', from: 'BOTH', funcA: stackA[i], funcB: stackB[i], s: s, energy, idxA: i, idxB: i });
                }
            }
            complementData.sort((a, b) => b.s - a.s);
        }

        // --- Narrator System ---
        const narrationText = document.getElementById('narration-text');
        const narrationPanel = document.getElementById('narration-panel');

        function showNarration(text, subtext = '') {
            narrationText.classList.remove('visible');
            setTimeout(() => {
                narrationText.innerHTML = `${text}${subtext ? `<div class="function-desc">${subtext}</div>` : ''}`;
                narrationText.classList.add('visible');
            }, 100);
        }

        // --- Timeline Loop ---
        function updateTimeline(delta) {
            if (state.mode !== 'PLAYING') return;
            state.timeline.elapsed += delta;
            const t = state.timeline.elapsed;

            // Phase detection
            let newPhase = 'INTRO';
            if (t > 16) newPhase = 'OVERVIEW';
            else if (t > 12) newPhase = 'DIFF';
            else if (t > 6) newPhase = 'SUB';
            else if (t > 2) newPhase = 'CORE';

            if (newPhase !== state.timeline.phase) {
                state.timeline.phase = newPhase;
                onPhaseChange(newPhase);
            }
            updateBeamsVisibility(t);
        }

        function onPhaseChange(phase) {
            const uA = state.users.A;
            const uB = state.users.B;
            const rank = document.getElementById('rank-display').textContent;

            switch (phase) {
                case 'INTRO':
                    showNarration(`あなたたちは「${rank}ランク」の関係です。`, `互いのエネルギーがどのように巡るか解析します。`);
                    break;
                case 'CORE':
                    if (complementData.length > 0) {
                        const c = complementData[0];
                        const info = functionInfo[c.func || c.funcA];
                        showNarration(`コア補完：${info.name} (${c.func || c.funcA})`, info.desc);
                    } else {
                        showNarration(`目立った補完は見当たりませんが、<br>独自の距離感を保っています。`);
                    }
                    break;
                case 'SUB':
                    if (complementData.length > 1) {
                        showNarration(`さらに、複数の補助的な補完が<br>関係を支えています。`);
                    }
                    break;
                case 'DIFF':
                    showNarration(`ただし、性格の「ズレ」による<br>摩擦には注意が必要です。`);
                    break;
                case 'OVERVIEW':
                    showNarration(`総括：${rank}評価のパートナー性能`, `補完し合いながら進化し続ける関係です。`);
                    break;
            }
        }

        function initParticles() {
            // Replaces old particle system with null to prevent errors if refs exist
        }
        initParticles();

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // Connecting Line
        const lineMat = new THREE.LineBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // Guide Lines (Dashed)
        function createGuideLines() {
            const matX = new THREE.LineDashedMaterial({ color: 0xE4AE3A, transparent: true, opacity: 0.6, dashSize: 0.2, gapSize: 0.1 }); // NS
            const matY = new THREE.LineDashedMaterial({ color: 0x33A474, transparent: true, opacity: 0.6, dashSize: 0.2, gapSize: 0.1 }); // TF
            const matZ = new THREE.LineDashedMaterial({ color: 0x8A61A6, transparent: true, opacity: 0.6, dashSize: 0.2, gapSize: 0.1 }); // JP

            const lines = {
                x: new THREE.Line(new THREE.BufferGeometry(), matX),
                y: new THREE.Line(new THREE.BufferGeometry(), matY),
                z: new THREE.Line(new THREE.BufferGeometry(), matZ)
            };
            scene.add(lines.x);
            scene.add(lines.y);
            scene.add(lines.z);
            return lines;
        }
        const guidesA = createGuideLines();
        const guidesB = createGuideLines();

        function updateVisuals() {
            const uA = state.users.A;
            const uB = state.users.B;

            sphereA.visible = !isAllFifty(uA);
            sphereB.visible = !isAllFifty(uB);
            line.visible = sphereA.visible && sphereB.visible;

            // Update tab texts
            const typeStrA = getMBTITypeString(uA);
            const typeStrB = getMBTITypeString(uB);
            document.getElementById('tab-A').querySelector('.mbti-type').textContent = `(${typeStrA})`;
            document.getElementById('tab-B').querySelector('.mbti-type').textContent = `(${typeStrB})`;

            // Update SCORE summary
            const summaryA = document.getElementById('summary-A');
            summaryA.querySelector('.score-type-name').textContent = typeStrA;
            summaryA.querySelector('.score-nickname').textContent = `タイプ：${getNickname(typeStrA)}`;
            const summaryB = document.getElementById('summary-B');
            summaryB.querySelector('.score-type-name').textContent = typeStrB;
            summaryB.querySelector('.score-nickname').textContent = `タイプ：${getNickname(typeStrB)}`;

            // 1. Position mapping: (Value - 50) / 50 => -1.0 ~ 1.0, then scale
            const getPos = (data) => new THREE.Vector3(
                ((data.NS - 50) / 50) * SCALE, // X: N-S
                ((data.TF - 50) / 50) * SCALE, // Y: T-F
                ((data.JP - 50) / 50) * SCALE  // Z: J-P
            );

            sphereA.position.copy(getPos(uA));
            sphereB.position.copy(getPos(uB));

            // Line update
            lineGeo.setFromPoints([sphereA.position, sphereB.position]);

            // Update Guides
            function updateGuides(guides, pos, visible) {
                guides.x.visible = guides.y.visible = guides.z.visible = visible;
                if (!visible) return;

                // X (NS) guide to left wall
                guides.x.geometry.setFromPoints([pos, new THREE.Vector3(-SCALE, pos.y, pos.z)]);
                guides.x.computeLineDistances();
                // Y (TF) guide to floor
                guides.y.geometry.setFromPoints([pos, new THREE.Vector3(pos.x, -SCALE, pos.z)]);
                guides.y.computeLineDistances();
                // Z (JP) guide to back wall
                guides.z.geometry.setFromPoints([pos, new THREE.Vector3(pos.x, pos.y, -SCALE)]);
                guides.z.computeLineDistances();
            }
            updateGuides(guidesA, sphereA.position, sphereA.visible);
            updateGuides(guidesB, sphereB.position, sphereB.visible);

            // 2. Looks mapping
            const applyLooks = (mesh, data) => {
                // Glow (E-I): 0 is E (max glow), 100 is I (min glow)
                const glow = (100 - data.EI) / 100;
                const emissiveIntensity = 0.3 + glow * 2.0;

                // Color
                const col = getGroupColor(data.NS, data.TF, data.JP);

                // Scale mapping: A=1.3, T=0.7 (Base=1.0 @ 50)
                const getScale = (at) => 1.3 - (at / 100) * 0.6;
                mesh.scale.setScalar(getScale(data.AT));

                mesh.material.color.copy(col).multiplyScalar(0.2); // Base reflection
                mesh.material.emissive.copy(col);
                mesh.material.emissiveIntensity = emissiveIntensity;
            };

            applyLooks(sphereA, uA);
            applyLooks(sphereB, uB);

            // 3. Logic & Compatibility
            // Distance between normalized coords (-1 to 1 means max distance per axis is 2)
            // Normalized positions distance = dist / SCALE
            const distance = sphereA.position.distanceTo(sphereB.position) / SCALE;

            // Score = (1 - (D/3)) * 100 -- based on spec
            let score = (1.0 - (distance / 3.0)) * 100;
            score = Math.max(0, Math.min(100, score));

            // Line opacity based on real distance to make it fade
            lineMat.opacity = Math.max(0.1, 1.0 - (distance * 0.3));

            // Update DOM Info
            scoreDisplay.textContent = Math.round(score);

            let rank = 'D';
            let rankColor = '#e74c3c'; // Red
            if (score >= 80) {
                rank = 'S'; rankColor = '#FFD700'; // Gold
            } else if (score >= 60) {
                rank = 'A'; rankColor = '#2ecc71'; // Green
            } else if (score >= 40) {
                rank = 'B'; rankColor = '#3498db'; // Blue
            } else if (score >= 20) {
                rank = 'C'; rankColor = '#e67e22'; // Orange
            }

            rankDisplay.textContent = rank;
            rankDisplay.style.color = rankColor;

            sphereA.visible = true;
            const p2Untouched = isAllFifty(uB);
            sphereB.visible = !p2Untouched;
            line.visible = !p2Untouched;

            const stackA = getFunctionStack(typeStrA);
            const stackB = getFunctionStack(typeStrB);
            const totalS = complementData.reduce((acc, c) => acc + c.s, 0) * 15;
            let compScore = totalS;
            if (stackA && stackB) {
                const getPerceptionAxis = (s) => (s.includes('Ni') || s.includes('Se')) ? 'NiSe' : 'NeSi';
                const getJudgmentAxis = (s) => (s.includes('Ti') || s.includes('Fe')) ? 'TiFe' : 'TeFi';
                if (getPerceptionAxis(stackA) !== getPerceptionAxis(stackB)) compScore += 10;
                if (getJudgmentAxis(stackA) !== getJudgmentAxis(stackB)) compScore += 10;
            }
            if (compScore > 0 && compScore < 1) compScore = 1;
            compScore = Math.min(100, compScore);
            document.getElementById('comp-score-display').textContent = Math.round(compScore);
            let compRank = 'D';
            let compRankColor = '#e74c3c';
            if (compScore >= 80) { compRank = 'S+'; compRankColor = '#FFD700'; }
            else if (compScore >= 60) { compRank = 'A'; compRankColor = '#2ecc71'; }
            else if (compScore >= 40) { compRank = 'B'; compRankColor = '#3498db'; }
            else if (compScore >= 20) { compRank = 'C'; compRankColor = '#e67e22'; }
            const crD = document.getElementById('comp-rank-display');
            crD.textContent = compRank;
            crD.style.color = compRankColor;
            crD.style.boxShadow = `0 0 10px ${compRankColor}`;

            // SCORE Narrative Update
            const narrBox = document.getElementById('score-narration-box');
            if (narrBox) {
                if (p2Untouched) {
                    narrBox.innerHTML = `P2の性格を入力して、二人の関係性（相性スコア・補完関係）を解析しましょう。`;
                } else {
                    let text = `<strong>Distance Score: ${rank} <br>Complement Score: ${compRank}</strong><br><br>`;
                    if (complementData.length > 0) {
                        const c = complementData[0];
                        const info = functionInfo[c.func || c.funcA];
                        text += `【最大の補強ポイント】<br>${info.name} (${c.func || c.funcA})<br><span style='font-size: 11px; opacity: 0.8;'>${info.desc}</span>`;
                    } else {
                        text += `目立った補完関係は見られませんが、直感・現実などの軸での相互作用が独自の距離感を生み出しています。`;
                    }
                    narrBox.innerHTML = text;
                }
            }

            const updateNodes = (stack, pPrefix, cData) => {
                for (let i = 0; i < 4; i++) {
                    const node = document.getElementById(`${pPrefix}-f${i + 1}-side`);
                    const nodeOld = document.getElementById(`${pPrefix}-f${i + 1}`);
                    [node, nodeOld].forEach(n => {
                        if (!n) return;
                        if (stack) {
                            n.textContent = stack[i];
                            n.className = 'function-node dimmed';
                            const phase = state.timeline.phase;
                            cData.forEach((c, idx) => {
                                let active = (phase === 'CORE' && idx === 0) || (phase === 'SUB' && idx < 3) || phase === 'OVERVIEW';
                                if (active && ((pPrefix === 'p1' && c.idxA === i) || (pPrefix === 'p2' && c.idxB === i))) {
                                    n.classList.remove('dimmed');
                                    if (c.type === 'MIRROR') n.classList.add('glow-mirror');
                                    else if (idx === 0) n.classList.add('glow-high');
                                    else n.classList.add('glow-mid');
                                }
                            });
                            if (phase === 'IDLE' || phase === 'INTRO' || phase === 'DIFF' || state.mode === 'EDITING') n.classList.remove('dimmed');
                        } else {
                            n.textContent = '-';
                            n.className = 'function-node';
                        }
                    });
                }
            };
            updateNodes(stackA, 'p1', complementData);
            updateNodes(p2Untouched ? null : stackB, 'p2', complementData);

            // Adjust bloom based on average E-I globally (optional juicy effect)
            const avgGlow = ((100 - uA.EI) / 100 + (100 - uB.EI) / 100) / 2;
            bloomPass.strength = 0.5 + avgGlow * 1.5;
        }

        // Apply turbulence (vibration) for T (Turbulent) types
        function applyTurbulence(sphere, data, timeOffset) {
            const at = data.AT;
            if (at > 50) {
                const tFactor = (at - 50) / 50;
                const baseRadius = 0.8;
                const currentScale = 1.3 - (at / 100) * 0.6;
                const currentRadius = baseRadius * currentScale;
                const maxOffset = baseRadius - currentRadius;
                const offset = Math.sin(performance.now() / 1000 * Math.PI) * maxOffset * tFactor;
                sphere.position.y += offset;
            }
        }
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const w = Math.max(1, container.clientWidth);
            const h = Math.max(1, container.clientHeight);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        }

        function updateParticles(delta) {
            // Nullified
        }

        // Render loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const now = performance.now();

            // State Machine transitions
            if (state.mode === 'EDITING') {
                if (now - state.lastInteraction > 600) {
                    // Only start if BOTH users are modified
                    if (!isAllFifty(state.users.A) && !isAllFifty(state.users.B)) {
                        state.mode = 'ANALYZING';
                        document.getElementById('analysis-overlay').style.display = 'flex';
                        setTimeout(() => {
                            if (state.mode === 'ANALYZING') {
                                state.mode = 'PLAYING';
                                state.timeline.elapsed = 0;
                                state.timeline.phase = 'IDLE';
                                document.getElementById('analysis-overlay').style.display = 'none';
                                document.getElementById('narration-panel').style.display = 'block';
                                calculateComplements();
                            }
                        }, 1200); // Analysis time
                    } else {
                        state.mode = 'IDLE';
                    }
                }
            }

            // Clear base positions
            const getPos = (data) => new THREE.Vector3(
                ((data.NS - 50) / 50) * SCALE,
                ((data.TF - 50) / 50) * SCALE,
                ((data.JP - 50) / 50) * SCALE
            );
            sphereA.position.copy(getPos(state.users.A));
            sphereB.position.copy(getPos(state.users.B));
            const p2Untouched = isAllFifty(state.users.B);
            sphereA.visible = true;
            sphereB.visible = !p2Untouched;
            line.visible = !p2Untouched;

            applyTurbulence(sphereA, state.users.A, 0);
            applyTurbulence(sphereB, state.users.B, 5);

            lineGeo.setFromPoints([sphereA.position, sphereB.position]);

            if (state.mode === 'PLAYING') {
                updateTimeline(delta);
            } else {
                beamsGroup.clear();
            }

            controls.update();
            composer.render();
        }

        // Initialize
        updateVisuals();
        animate();

    </script>
</body>

</html>
