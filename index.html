<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBTI 5D Visualizer (Refactored)</title>
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="visualizer-main">
        <!-- Startup Overlay -->
        <div id="startup-overlay">
            <div class="startup-content">
                <h1>MBTI 5D</h1>
                <div class="startup-line"></div>
                <p>Interactive Cognitive Engine</p>
            </div>
        </div>

        <!-- Analysis Effect Overlay -->
        <div id="analysis-overlay">
            <div class="analysis-spinner"></div>
            <div class="analysis-text">ANALYZING SPECTRUM...</div>
        </div>

        <div id="narration-panel">
            <div id="narration-text"></div>
        </div>

        <div id="canvas-container"></div>

        <!-- Side Stacks (Floating) -->
        <div id="side-stack-A" class="side-stack">
            <div class="side-stack-label">P1 STACK</div>
            <div class="function-slot">
                <div id="p1-f1-side" class="function-node"></div>
                <div id="p1-f1-lv" class="function-lv"></div>
            </div>
            <div class="function-slot">
                <div id="p1-f2-side" class="function-node"></div>
                <div id="p1-f2-lv" class="function-lv"></div>
            </div>
            <div class="function-slot">
                <div id="p1-f3-side" class="function-node"></div>
                <div id="p1-f3-lv" class="function-lv"></div>
            </div>
            <div class="function-slot">
                <div id="p1-f4-side" class="function-node"></div>
                <div id="p1-f4-lv" class="function-lv"></div>
            </div>
        </div>

        <div id="side-stack-B" class="side-stack">
            <div class="side-stack-label">P2 STACK</div>
            <div class="function-slot">
                <div id="p2-f1-side" class="function-node"></div>
                <div id="p2-f1-lv" class="function-lv"></div>
            </div>
            <div class="function-slot">
                <div id="p2-f2-side" class="function-node"></div>
                <div id="p2-f2-lv" class="function-lv"></div>
            </div>
            <div class="function-slot">
                <div id="p2-f3-side" class="function-node"></div>
                <div id="p2-f3-lv" class="function-lv"></div>
            </div>
            <div class="function-slot">
                <div id="p2-f4-side" class="function-node"></div>
                <div id="p2-f4-lv" class="function-lv"></div>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div class="main-ui">
            <div class="controls-area">
                <div class="tabs">
                    <div class="tab active" data-target="A" id="tab-A">YOU <span class="mbti-type"></span></div>
                    <div class="tab" data-target="B" id="tab-B">OTHER <span class="mbti-type"></span></div>
                    <div class="tab" data-target="SCORE" id="tab-SCORE">SCORE</div>
                </div>

                <!-- P1/P2 Settings -->
                <div id="panel-A" class="tab-panel active">
                    <div class="sliders">
                        <!-- EI -->
                        <div class="slider-row">
                            <div class="slider-label"><span id="lbl-EI-L">外向型</span><span id="lbl-EI-R">内向型</span></div>
                            <div class="slider-control">
                                <button class="adjust-btn" data-key="EI" data-dir="-1">-</button>
                                <div class="slider-wrapper">
                                    <div class="ticks" id="ticks-EI"></div>
                                    <input type="range" id="slider-EI" min="0" max="100" value="50">
                                </div>
                                <button class="adjust-btn" data-key="EI" data-dir="1">+</button>
                            </div>
                        </div>
                        <!-- NS -->
                        <div class="slider-row">
                            <div class="slider-label"><span id="lbl-NS-L">直感型</span><span id="lbl-NS-R">現実型</span></div>
                            <div class="slider-control">
                                <button class="adjust-btn" data-key="NS" data-dir="-1">-</button>
                                <div class="slider-wrapper">
                                    <div class="ticks" id="ticks-NS"></div>
                                    <input type="range" id="slider-NS" min="0" max="100" value="50">
                                </div>
                                <button class="adjust-btn" data-key="NS" data-dir="1">+</button>
                            </div>
                        </div>
                        <!-- TF -->
                        <div class="slider-row">
                            <div class="slider-label"><span id="lbl-TF-L">思考型</span><span id="lbl-TF-R">感情型</span></div>
                            <div class="slider-control">
                                <button class="adjust-btn" data-key="TF" data-dir="-1">-</button>
                                <div class="slider-wrapper">
                                    <div class="ticks" id="ticks-TF"></div>
                                    <input type="range" id="slider-TF" min="0" max="100" value="50">
                                </div>
                                <button class="adjust-btn" data-key="TF" data-dir="1">+</button>
                            </div>
                        </div>
                        <!-- JP -->
                        <div class="slider-row">
                            <div class="slider-label"><span id="lbl-JP-L">計画型</span><span id="lbl-JP-R">探索型</span></div>
                            <div class="slider-control">
                                <button class="adjust-btn" data-key="JP" data-dir="-1">-</button>
                                <div class="slider-wrapper">
                                    <div class="ticks" id="ticks-JP"></div>
                                    <input type="range" id="slider-JP" min="0" max="100" value="50">
                                </div>
                                <button class="adjust-btn" data-key="JP" data-dir="1">+</button>
                            </div>
                        </div>
                        <!-- AT -->
                        <div class="slider-row">
                            <div class="slider-label"><span id="lbl-AT-L">自己主張型</span><span id="lbl-AT-R">激動型</span>
                            </div>
                            <div class="slider-control">
                                <button class="adjust-btn" data-key="AT" data-dir="-1">-</button>
                                <div class="slider-wrapper">
                                    <div class="ticks" id="ticks-AT"></div>
                                    <input type="range" id="slider-AT" min="0" max="100" value="50">
                                </div>
                                <button class="adjust-btn" data-key="AT" data-dir="1">+</button>
                            </div>
                        </div>
                    </div>
                    <!-- Description Button Placeholder -->
                    <div class="desc-btn-container" style="margin-top: 20px;">
                        <button class="share-btn desc-btn" id="desc-mode-btn">あなたの説明</button>
                    </div>
                </div>

                <!-- SCORE summary -->
                <div id="panel-SCORE" class="tab-panel">
                    <div class="score-row">
                        <div class="score-box">
                            <div class="info-title">類似度</div>
                            <div class="score-value" id="score-display">0</div>
                            <div class="rank-badge" id="rank-display">D</div>
                        </div>
                        <div class="score-box" id="comp-score-box">
                            <div class="info-title">補完度</div>
                            <div class="score-value"><span id="comp-score-display">0</span><span
                                    class="mirror-icon">🔁</span></div>
                            <div class="rank-badge" id="comp-rank-display">D</div>
                        </div>
                    </div>

                    <div class="actions-grid">
                        <button class="share-btn" id="share-x-btn">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                            </svg>
                            結果をシェア
                        </button>
                        <button class="share-btn" id="copy-url-btn">リンクをコピー</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="copy-toast" class="copy-toast">URLをコピーしました</div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
